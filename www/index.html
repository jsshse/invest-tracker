<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F0FDF4">
  <title>投资收益记录</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', '"IBM Plex Sans"', 'sans-serif'],
            mono: ['"IBM Plex Sans"', 'monospace'],
          },
          colors: {
            bg: '#F0FDF4',
            surface: '#FFFFFF',
            primary: '#0F172A',
            accent: '#2563EB',
            'accent-soft': '#EFF6FF',
            cta: '#4F46E5,
            muted: '#64748B',
            border: '#E2E8F0',
            positive: '#059669',
            'positive-soft': '#ECFDF5',
            negative: '#DC2626',
            'negative-soft': '#FEF2F2',
            gold: '#F59E0B',
            'gold-soft': '#FFFBEB',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-bg text-primary font-sans antialiased min-h-screen">
  <!-- Lock Screen -->
  <div id="lockScreen" class="fixed inset-0 z-[100] bg-bg flex flex-col items-center justify-center">
    <div class="w-20 h-20 bg-primary rounded-3xl flex items-center justify-center mb-6 shadow-lg">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
    </div>
    <h2 class="text-xl font-bold mb-2">投资收益记录</h2>
    <p class="text-sm text-muted mb-8">请验证指纹以继续</p>
    <button id="btnUnlock" class="px-8 py-4 bg-primary text-white text-base font-semibold rounded-2xl shadow-lg hover:bg-primary/90 transition-all flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/>
        <circle cx="12" cy="15" r="2"/>
      </svg>
      点击验证指纹
    </button>
    <p id="lockError" class="text-red-500 text-sm mt-4 hidden">验证失败，请重试</p>
  </div>

  <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative overflow-hidden">
    <!-- Header -->
    <header class="px-5 pt-6 pb-3 bg-bg/80 backdrop-blur-xl sticky top-0 z-20">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-lg font-bold tracking-tight">投资收益记录</h1>
          <p class="text-[11px] text-muted mt-0.5">像算油耗一样算收益</p>
        </div>
        <button id="btnExport" class="p-2.5 rounded-2xl bg-surface border border-border text-muted hover:text-accent hover:border-accent/30 transition-all shadow-sm" title="导出数据">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </header>

    <!-- Views -->
    <main class="flex-1 px-5 pb-6 overflow-y-auto">
      <!-- Dashboard View -->
      <section id="viewDashboard" class="space-y-5">
        <!-- Hero Card -->
        <div class="hero-card rounded-3xl p-6 text-white relative overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-br from-emerald-600 via-emerald-700 to-teal-800"></div>
          <div class="absolute inset-0 opacity-10">
            <div class="absolute -right-10 -top-10 w-40 h-40 rounded-full bg-white/20"></div>
            <div class="absolute -left-5 -bottom-5 w-28 h-28 rounded-full bg-white/10"></div>
          </div>
          <div class="relative z-10">
            <p class="text-white/70 text-sm font-medium mb-1">总累计收益</p>
            <div id="totalCumulative" class="text-[42px] font-bold tracking-tight leading-none mb-4">¥0.00</div>
            <div class="grid grid-cols-3 gap-3">
              <div class="bg-white/20 backdrop-blur-sm rounded-2xl px-3 py-3">
                <p class="text-white/60 text-[11px] mb-0.5">当年收益</p>
                <p id="yearReturn" class="text-lg font-bold">¥0.00</p>
              </div>
              <div class="bg-white/20 backdrop-blur-sm rounded-2xl px-3 py-3">
                <p class="text-white/60 text-[11px] mb-0.5">当年充值</p>
                <p id="yearRecharge" class="text-lg font-bold">¥0.00</p>
              </div>
              <div class="bg-white/20 backdrop-blur-sm rounded-2xl px-3 py-3">
                <p class="text-white/60 text-[11px] mb-0.5">当年收益率</p>
                <p id="yearReturnRate" class="text-lg font-bold">0.00%</p>
              </div>
            </div>
            <div class="flex gap-5 mt-4 pt-3 border-t border-white/20 text-sm">
              <div>
                <span class="text-white/60 text-[11px] block">渠道数</span>
                <span id="channelCount" class="font-bold text-lg">0</span>
              </div>
              <div>
                <span class="text-white/60 text-[11px] block">总记录数</span>
                <span id="recordCount" class="font-bold text-lg">0</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Import -->
        <div class="flex items-center justify-between px-1">
          <label for="importFile" class="text-xs text-muted cursor-pointer hover:text-primary transition-colors flex items-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            导入备份
          </label>
          <input type="file" id="importFile" accept="application/json" class="hidden">
        </div>

        <!-- Channels List -->
        <div>
          <div class="flex items-center justify-between mb-3 px-1">
            <h2 class="text-sm font-bold text-primary/80 uppercase tracking-wider">投资渠道</h2>
            <button id="btnAddChannel" class="text-sm px-5 py-2.5 rounded-2xl text-white font-bold hover:opacity-90 transition-all shadow-lg" style="background-color: #059669;">
              + 新增渠道
            </button>
          </div>
          <div id="channelsList" class="space-y-3">
            <!-- Channels injected here -->
          </div>
        </div>
      </section>

      <!-- Channel Detail View -->
      <section id="viewChannel" class="hidden space-y-4">
        <button id="btnBack" class="flex items-center gap-1 text-sm font-medium text-white px-4 py-2 rounded-xl transition-all shadow-md" style="background-color: #64748B;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          返回首页
        </button>

        <div class="flex items-center justify-between">
          <h2 id="channelTitle" class="text-xl font-bold">渠道名称</h2>
          <button id="btnDeleteChannel" class="text-xs px-3 py-1.5 rounded-xl bg-red-50 text-red-500 font-medium hover:bg-red-100 transition-colors">
            删除
          </button>
        </div>

        <div class="rounded-3xl p-5 text-white relative overflow-hidden" style="background: linear-gradient(135deg, #059669, #047857);">
          <div class="absolute inset-0 opacity-10">
            <div class="absolute -right-8 -top-8 w-32 h-32 rounded-full bg-white/20"></div>
          </div>
          <div class="relative z-10 grid grid-cols-2 gap-4">
            <div>
              <p class="text-white/60 text-[11px] mb-1">最新总资产</p>
              <p id="channelTotal" class="text-2xl font-bold num-highlight">--</p>
            </div>
            <div>
              <p class="text-white/60 text-[11px] mb-1">累计收益</p>
              <p id="channelCumulative" class="text-2xl font-bold num-highlight">--</p>
            </div>
          </div>
        </div>

        <div class="flex items-center justify-between pt-1 px-1">
          <h3 class="text-sm font-bold text-primary/80 uppercase tracking-wider">历史记录</h3>
          <button id="btnAddRecord" class="text-sm px-5 py-2.5 rounded-2xl text-white font-bold hover:opacity-90 transition-all shadow-lg" style="background-color: #2563EB;">
            + 记一笔
          </button>
        </div>

        <div id="recordsList" class="space-y-3">
          <!-- Records injected here -->
        </div>
      </section>
    </main>

    <!-- Channel Modal -->
    <div id="channelModal" class="fixed inset-0 z-50 hidden">
      <div class="absolute inset-0 bg-black/50" id="channelModalOverlay"></div>
      <div class="absolute bottom-0 left-0 right-0 md:top-1/2 md:left-1/2 md:bottom-auto md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-sm rounded-t-3xl md:rounded-3xl p-6 shadow-2xl" style="background-color: #FFFFFF;">
        <h3 id="channelModalTitle" class="text-lg font-bold mb-5 text-gray-900">新增渠道</h3>
        <label class="block text-xs text-gray-500 mb-2 font-medium">渠道名称</label>
        <input type="text" id="channelNameInput" placeholder="例如：股票账户" class="w-full border border-gray-200 rounded-2xl px-4 py-3.5 text-gray-900 placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all" style="background-color: #F8FAFC;">
        <div class="flex gap-3 mt-6">
          <button id="btnCancelChannel" class="flex-1 py-3.5 rounded-2xl border-2 border-gray-200 text-gray-700 font-medium hover:bg-gray-50 transition-colors">取消</button>
          <button id="btnSaveChannel" class="flex-1 py-3.5 rounded-2xl text-white font-semibold hover:opacity-90 transition-all shadow-lg" style="background-color: #0F172A;">保存</button>
        </div>
      </div>
    </div>

    <!-- Record Modal -->
    <div id="recordModal" class="fixed inset-0 z-50 hidden">
      <div class="absolute inset-0 bg-black/50" id="recordModalOverlay"></div>
      <div class="absolute bottom-0 left-0 right-0 md:top-1/2 md:left-1/2 md:bottom-auto md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-sm rounded-t-3xl md:rounded-3xl p-6 shadow-2xl" style="background-color: #FFFFFF;">
        <h3 class="text-lg font-bold mb-5 text-gray-900">记录收益</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-xs text-gray-500 mb-2 font-medium">日期</label>
            <input type="date" id="recordDateInput" class="w-full border border-gray-200 rounded-2xl px-4 py-3.5 text-gray-900 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all" style="background-color: #F8FAFC;">
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-2 font-medium">总金额 (¥)</label>
            <input type="number" id="recordTotalInput" placeholder="0.00" step="0.01" class="w-full border border-gray-200 rounded-2xl px-4 py-3.5 text-gray-900 text-lg font-semibold placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all" style="background-color: #F8FAFC;">
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-2 font-medium">累计收益 (¥)</label>
            <input type="number" id="recordCumulativeInput" placeholder="0.00" step="0.01" class="w-full border border-gray-200 rounded-2xl px-4 py-3.5 text-gray-900 text-lg font-semibold placeholder-gray-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all" style="background-color: #F8FAFC;">
            <p class="text-[11px] text-gray-400 mt-2">App 自动算出区间收益、收益率和充值金额</p>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button id="btnCancelRecord" class="flex-1 py-3.5 rounded-2xl border-2 border-gray-200 text-gray-700 font-medium hover:bg-gray-50 transition-colors">取消</button>
          <button id="btnSaveRecord" class="flex-1 py-3.5 rounded-2xl text-white font-semibold hover:opacity-90 transition-all shadow-lg" style="background-color: #0F172A;">保存</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-5 py-3 rounded-2xl bg-primary text-white text-sm font-medium shadow-2xl opacity-0 pointer-events-none transition-opacity z-50">
      提示信息
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
