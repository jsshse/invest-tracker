<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#059669">
  <title>投资账本</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', '"IBM Plex Sans"', 'sans-serif'],
            mono: ['"IBM Plex Sans"', 'monospace'],
          },
          colors: {
            bg: '#F8FAFC',
            surface: '#FFFFFF',
            primary: '#0F172A',
            accent: '#059669',
            'accent-soft': '#ECFDF5',
            muted: '#64748B',
            border: '#E2E8F0',
            positive: '#DC2626',
            'positive-soft': '#FEF2F2',
            negative: '#059669',
            'negative-soft': '#ECFDF5',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-bg text-primary font-sans antialiased">
  <!-- Lock Screen -->
  <div id="lockScreen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-gradient-to-br from-emerald-600 to-emerald-700">
    <div class="w-20 h-20 rounded-full flex items-center justify-center mb-5 bg-white/20 backdrop-blur-sm">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
    </div>
    <h2 class="text-xl font-bold mb-1.5 text-white">投资账本</h2>
    <p class="text-xs text-emerald-100 mb-6">请验证指纹以继续</p>
    <button id="btnUnlock" class="px-8 py-3 bg-white text-emerald-600 text-sm font-semibold rounded-full shadow-lg transition-all flex items-center gap-2 hover:bg-emerald-50">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/>
        <circle cx="12" cy="15" r="2"/>
      </svg>
      点击验证指纹
    </button>
    <p id="lockError" class="text-red-200 text-sm mt-4 hidden">验证失败，请重试</p>
  </div>

  <div id="app" class="h-screen flex flex-col bg-white">
    <!-- Header - Fixed -->
    <header class="px-4 pt-3 pb-3 bg-white border-b border-gray-100 shrink-0">
      <div class="flex items-center justify-between">
        <h1 class="text-base font-bold tracking-tight text-gray-900">投资账本</h1>
        <div class="flex items-center gap-2">
          <label for="importFile" class="p-2 rounded-full bg-gray-100 text-gray-600 hover:bg-emerald-50 hover:text-emerald-600 transition-all cursor-pointer" title="导入数据">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </label>
          <input type="file" id="importFile" accept="application/json" class="hidden">
          <button id="btnExport" class="p-2 rounded-full bg-gray-100 text-gray-600 hover:bg-emerald-50 hover:text-emerald-600 transition-all" title="导出数据">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content - Scrollable -->
    <main class="flex-1 h-full overflow-y-auto">
      <!-- Dashboard View -->
      <section id="viewDashboard">
        <!-- Stats Card -->
        <div class="bg-gray-50 p-4">
          <div class="grid grid-cols-3 gap-3 mb-3">
            <div class="bg-white rounded-xl p-3 border border-gray-100">
              <p class="text-gray-500 text-[10px] mb-1">当年收益</p>
              <p id="yearReturn" class="text-sm font-bold num-highlight text-gray-900">¥0.00</p>
            </div>
            <div class="bg-white rounded-xl p-3 border border-gray-100">
              <p class="text-gray-500 text-[10px] mb-1">本金余额</p>
              <p id="yearRecharge" class="text-sm font-bold num-highlight text-gray-900">¥0.00</p>
            </div>
            <div class="bg-white rounded-xl p-3 border border-gray-100">
              <p class="text-gray-500 text-[10px] mb-1">当年收益率</p>
              <p id="yearReturnRate" class="text-sm font-bold num-highlight text-gray-900">0.00%</p>
            </div>
          </div>
          <div class="flex gap-6 px-1">
            <div>
              <span class="text-gray-500 text-[10px] block">渠道数</span>
              <span id="channelCount" class="font-bold text-sm text-gray-900">0</span>
            </div>
            <div>
              <span class="text-gray-500 text-[10px] block">总记录数</span>
              <span id="recordCount" class="font-bold text-sm text-gray-900">0</span>
            </div>
          </div>
        </div>

        <!-- Channels List -->
        <div class="px-4 py-3">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">投资渠道</h2>
            <button id="btnAddChannel" class="text-xs px-4 py-2 rounded-full bg-emerald-500 text-white font-medium hover:bg-emerald-600 transition-all shadow-sm">
              + 新增渠道
            </button>
          </div>
          <div id="channelsList" class="space-y-3">
            <!-- Channels injected here -->
          </div>
        </div>
      </section>

      <!-- Channel Detail View -->
      <section id="viewChannel" class="hidden h-full flex flex-col">
        <div class="px-4 pt-3 pb-3 bg-white border-b border-gray-100 shrink-0">
          <button id="btnBack" class="flex items-center gap-1 text-xs font-medium text-emerald-600 hover:text-emerald-700 transition-colors mb-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            返回首页
          </button>

          <div class="flex items-center justify-between">
            <h2 id="channelTitle" class="text-base font-bold text-gray-900">渠道名称</h2>
            <button id="btnDeleteChannel" class="text-xs px-3 py-1 rounded-full bg-red-50 text-red-500 font-medium hover:bg-red-100 transition-colors">
              删除
            </button>
          </div>

          <div class="grid grid-cols-2 gap-3 mt-3">
            <div class="bg-gray-50 rounded-xl p-3">
              <p class="text-gray-500 text-[10px] mb-1">最新总资产</p>
              <p id="channelTotal" class="text-base font-bold num-highlight text-gray-900">--</p>
            </div>
            <div class="bg-gray-50 rounded-xl p-3">
              <p class="text-gray-500 text-[10px] mb-1">累计收益</p>
              <p id="channelCumulative" class="text-base font-bold num-highlight text-gray-900">--</p>
            </div>
          </div>
        </div>

        <div id="channelRecordsScroll" class="px-4 py-3 flex-1 overflow-y-auto">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">历史记录</h3>
            <button id="btnAddRecord" class="text-xs px-4 py-2 rounded-full bg-emerald-500 text-white font-medium hover:bg-emerald-600 transition-all shadow-sm">
              + 记一笔
            </button>
          </div>

          <div id="recordsList" class="space-y-3">
            <!-- Records injected here -->
          </div>
        </div>
      </section>
    </main>

    <!-- Channel Modal -->
    <div id="channelModal" class="fixed inset-0 z-50 hidden">
      <div class="absolute inset-0 bg-black/50" id="channelModalOverlay"></div>
      <div class="absolute bottom-0 left-0 right-0 md:top-1/2 md:left-1/2 md:bottom-auto md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-sm rounded-t-3xl md:rounded-3xl p-6 shadow-2xl bg-white">
        <h3 id="channelModalTitle" class="text-lg font-bold mb-5 text-gray-900">新增渠道</h3>
        <label class="block text-xs text-gray-500 mb-2 font-medium">渠道名称</label>
        <input type="text" id="channelNameInput" placeholder="例如：股票账户" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 text-sm placeholder-gray-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition-all bg-gray-50">
        <div class="flex gap-3 mt-5">
          <button id="btnCancelChannel" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-700 text-sm font-medium hover:bg-gray-50 transition-colors">取消</button>
          <button id="btnSaveChannel" class="flex-1 py-3 rounded-xl bg-emerald-500 text-white text-sm font-semibold hover:bg-emerald-600 transition-all shadow-sm">保存</button>
        </div>
      </div>
    </div>

    <!-- Record Modal -->
    <div id="recordModal" class="fixed inset-0 z-50 hidden">
      <div class="absolute inset-0 bg-black/50" id="recordModalOverlay"></div>
      <div class="absolute bottom-0 left-0 right-0 md:top-1/2 md:left-1/2 md:bottom-auto md:-translate-x-1/2 md:-translate-y-1/2 md:w-full md:max-w-sm rounded-t-3xl md:rounded-3xl p-6 shadow-2xl bg-white">
        <h3 class="text-lg font-bold mb-5 text-gray-900">记录收益</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-xs text-gray-500 mb-2 font-medium">日期</label>
            <input type="date" id="recordDateInput" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 text-sm focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition-all bg-gray-50">
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-2 font-medium">总金额 (¥)</label>
            <input type="number" id="recordTotalInput" placeholder="0.00" step="0.01" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 text-sm font-semibold placeholder-gray-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition-all bg-gray-50">
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-2 font-medium">累计收益 (¥)</label>
            <input type="number" id="recordCumulativeInput" placeholder="0.00" step="0.01" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-900 text-sm font-semibold placeholder-gray-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition-all bg-gray-50">
            <p class="text-[11px] text-gray-400 mt-2">App 自动算出区间收益、收益率和充值金额</p>
          </div>
        </div>
        <div class="flex gap-3 mt-5">
          <button id="btnCancelRecord" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-700 text-sm font-medium hover:bg-gray-50 transition-colors">取消</button>
          <button id="btnSaveRecord" class="flex-1 py-3 rounded-xl bg-emerald-500 text-white text-sm font-semibold hover:bg-emerald-600 transition-all shadow-sm">保存</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-gray-900 text-white text-sm font-medium shadow-lg opacity-0 pointer-events-none transition-opacity z-50">
      提示信息
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
